# Reference only - the unified compose files in compose/ are used for deployment
services:
  nextcloud:
    image: nextcloud:30-apache
    container_name: nextcloud
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      OVERWRITEHOST: cloud.${LANTERN_DOMAIN}
      OVERWRITEPROTOCOL: https
    volumes:
      - ../data/nextcloud/html:/var/www/html
      - ../data/nextcloud/data:/var/www/html/data
    networks:
      - lantern
    labels:
      - traefik.enable=true
      - traefik.docker.network=lantern
      - traefik.http.routers.nextcloud.rule=Host(`cloud.${LANTERN_DOMAIN}`)
      - traefik.http.routers.nextcloud.entrypoints=websecure
      - traefik.http.routers.nextcloud.tls.certresolver=letsencrypt
      - traefik.http.routers.nextcloud.middlewares=default-chain@file
      - traefik.http.services.nextcloud.loadbalancer.server.port=80

networks:
  lantern:
    name: lantern
