services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    profiles: ["jellyfin"]
    env_file:
      - ${DATA_ROOT}/stacks/jellyfin.env
    environment:
      TZ: ${TZ}
    volumes:
      - ${DATA_ROOT}/data/jellyfin/config:/config
      - ${DATA_ROOT}/data/jellyfin/cache:/cache
      - ${JELLYFIN_MEDIA_PATH}:/media:ro
    networks:
      - lantern
    labels:
      - traefik.enable=true
      - traefik.docker.network=lantern
      - traefik.http.routers.jellyfin.rule=Host(`media.${LANTERN_DOMAIN}`)
      - traefik.http.routers.jellyfin.entrypoints=websecure
      - traefik.http.routers.jellyfin.tls.certresolver=letsencrypt
      - traefik.http.routers.jellyfin.middlewares=authentik-auth@docker,default-chain@file
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096

  immich-postgres:
    image: tensorchord/pgvecto-rs:pg16-v0.3.0
    container_name: immich-postgres
    restart: unless-stopped
    profiles: ["immich"]
    env_file:
      - ${DATA_ROOT}/stacks/immich.env
    environment:
      POSTGRES_DB: immich
      POSTGRES_USER: immich
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
    volumes:
      - ${DATA_ROOT}/data/immich/postgres:/var/lib/postgresql/data
    networks:
      - lantern
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immich -d immich"]
      interval: 10s
      timeout: 5s
      retries: 10

  immich-redis:
    image: redis:7-alpine
    container_name: immich-redis
    restart: unless-stopped
    profiles: ["immich"]
    env_file:
      - ${DATA_ROOT}/stacks/immich.env
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ${DATA_ROOT}/data/immich/redis:/data
    networks:
      - lantern
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    restart: unless-stopped
    profiles: ["immich"]
    env_file:
      - ${DATA_ROOT}/stacks/immich.env
    volumes:
      - ${DATA_ROOT}/data/immich/model-cache:/cache
    networks:
      - lantern

  immich:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich
    restart: unless-stopped
    profiles: ["immich"]
    env_file:
      - ${DATA_ROOT}/stacks/immich.env
    environment:
      DB_HOSTNAME: immich-postgres
      DB_DATABASE_NAME: immich
      DB_USERNAME: immich
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      REDIS_HOSTNAME: immich-redis
      IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - ${DATA_ROOT}/data/immich/cache:/cache
      - ${IMMICH_EXTERNAL_LIBRARY}:/external:ro
    depends_on:
      immich-postgres:
        condition: service_healthy
      immich-redis:
        condition: service_healthy
    networks:
      - lantern
    labels:
      - traefik.enable=true
      - traefik.docker.network=lantern
      - traefik.http.routers.immich.rule=Host(`photos.${LANTERN_DOMAIN}`)
      - traefik.http.routers.immich.entrypoints=websecure
      - traefik.http.routers.immich.tls.certresolver=letsencrypt
      - traefik.http.routers.immich.middlewares=authentik-auth@docker,default-chain@file
      - traefik.http.services.immich.loadbalancer.server.port=2283

  nextcloud-mariadb:
    image: mariadb:11
    container_name: nextcloud-mariadb
    restart: unless-stopped
    profiles: ["nextcloud"]
    env_file:
      - ${DATA_ROOT}/stacks/nextcloud.env
    environment:
      MARIADB_DATABASE: ${NEXTCLOUD_DB_NAME}
      MARIADB_USER: ${NEXTCLOUD_DB_USER}
      MARIADB_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${NEXTCLOUD_DB_ROOT_PASSWORD}
    volumes:
      - ${DATA_ROOT}/data/nextcloud/mariadb:/var/lib/mysql
    networks:
      - lantern
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p${NEXTCLOUD_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    profiles: ["nextcloud"]
    env_file:
      - ${DATA_ROOT}/stacks/nextcloud.env
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ${DATA_ROOT}/data/nextcloud/redis:/data
    networks:
      - lantern
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nextcloud:
    image: nextcloud:30-apache
    container_name: nextcloud
    restart: unless-stopped
    profiles: ["nextcloud"]
    env_file:
      - ${DATA_ROOT}/stacks/nextcloud.env
    environment:
      TZ: ${TZ}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      OVERWRITEHOST: cloud.${LANTERN_DOMAIN}
      OVERWRITEPROTOCOL: https
      MYSQL_DATABASE: ${NEXTCLOUD_DB_NAME}
      MYSQL_USER: ${NEXTCLOUD_DB_USER}
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      MYSQL_HOST: ${NEXTCLOUD_DB_HOST}
      REDIS_HOST: ${NEXTCLOUD_REDIS_HOST}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
    volumes:
      - ${DATA_ROOT}/data/nextcloud/html:/var/www/html
      - ${DATA_ROOT}/data/nextcloud/data:/var/www/html/data
    depends_on:
      nextcloud-mariadb:
        condition: service_healthy
      nextcloud-redis:
        condition: service_healthy
    networks:
      - lantern
    labels:
      - traefik.enable=true
      - traefik.docker.network=lantern
      - traefik.http.routers.nextcloud.rule=Host(`cloud.${LANTERN_DOMAIN}`)
      - traefik.http.routers.nextcloud.entrypoints=websecure
      - traefik.http.routers.nextcloud.tls.certresolver=letsencrypt
      - traefik.http.routers.nextcloud.middlewares=authentik-auth@docker,default-chain@file
      - traefik.http.services.nextcloud.loadbalancer.server.port=80

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    profiles: ["filebrowser"]
    env_file:
      - ${DATA_ROOT}/stacks/filebrowser.env
    command:
      - --database
      - /database/filebrowser.db
      - --root
      - ${FILEBROWSER_ROOT_PATH}
      - --port
      - "80"
    volumes:
      - ${DATA_ROOT}/data/filebrowser/database:/database
      - ${FILEBROWSER_ROOT_PATH}:${FILEBROWSER_ROOT_PATH}
    networks:
      - lantern
    labels:
      - traefik.enable=true
      - traefik.docker.network=lantern
      - traefik.http.routers.filebrowser.rule=Host(`files.${LANTERN_DOMAIN}`)
      - traefik.http.routers.filebrowser.entrypoints=websecure
      - traefik.http.routers.filebrowser.tls.certresolver=letsencrypt
      - traefik.http.routers.filebrowser.middlewares=authentik-auth@docker,default-chain@file
      - traefik.http.services.filebrowser.loadbalancer.server.port=80

  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie
    restart: unless-stopped
    profiles: ["mealie"]
    env_file:
      - ${DATA_ROOT}/stacks/mealie.env
    volumes:
      - ${DATA_ROOT}/data/mealie/data:/app/data
    networks:
      - lantern
    labels:
      - traefik.enable=true
      - traefik.docker.network=lantern
      - traefik.http.routers.mealie.rule=Host(`recipes.${LANTERN_DOMAIN}`)
      - traefik.http.routers.mealie.entrypoints=websecure
      - traefik.http.routers.mealie.tls.certresolver=letsencrypt
      - traefik.http.routers.mealie.middlewares=authentik-auth@docker,default-chain@file
      - traefik.http.services.mealie.loadbalancer.server.port=9000

  paperless-postgres:
    image: postgres:16-alpine
    container_name: paperless-postgres
    restart: unless-stopped
    profiles: ["paperless"]
    env_file:
      - ${DATA_ROOT}/stacks/paperless.env
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${PAPERLESS_DB_PASSWORD}
    volumes:
      - ${DATA_ROOT}/data/paperless/postgres:/var/lib/postgresql/data
    networks:
      - lantern
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperless -d paperless"]
      interval: 10s
      timeout: 5s
      retries: 10

  paperless-redis:
    image: redis:7-alpine
    container_name: paperless-redis
    restart: unless-stopped
    profiles: ["paperless"]
    env_file:
      - ${DATA_ROOT}/stacks/paperless.env
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ${DATA_ROOT}/data/paperless/redis:/data
    networks:
      - lantern
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: unless-stopped
    profiles: ["paperless"]
    env_file:
      - ${DATA_ROOT}/stacks/paperless.env
    environment:
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBHOST: paperless-postgres
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: ${PAPERLESS_DB_PASSWORD}
      PAPERLESS_URL: https://docs.${LANTERN_DOMAIN}
    volumes:
      - ${DATA_ROOT}/data/paperless/data:/usr/src/paperless/data
      - ${DATA_ROOT}/data/paperless/media:/usr/src/paperless/media
      - ${DATA_ROOT}/data/paperless/export:/usr/src/paperless/export
      - ${PAPERLESS_CONSUME_PATH}:/usr/src/paperless/consume
    depends_on:
      paperless-postgres:
        condition: service_healthy
      paperless-redis:
        condition: service_healthy
    networks:
      - lantern
    labels:
      - traefik.enable=true
      - traefik.docker.network=lantern
      - traefik.http.routers.paperless.rule=Host(`docs.${LANTERN_DOMAIN}`)
      - traefik.http.routers.paperless.entrypoints=websecure
      - traefik.http.routers.paperless.tls.certresolver=letsencrypt
      - traefik.http.routers.paperless.middlewares=authentik-auth@docker,default-chain@file
      - traefik.http.services.paperless.loadbalancer.server.port=8000

networks:
  lantern:
    external: true
    name: lantern
